services:
    grpcbackend:
        hostname: grpcbackend
        build:
            context: backend/.
            dockerfile: Containerfile
        ports:
            - 8080:8080
        environment:
            - GOSHORTEN_REDIS_HOST=redis:6379
            - GOSHORTEN_REDIS_PASS=mysecretpassword
            - GOSHORTEN_POSTGRES_HOST=postgres
            - GOSHORTEN_POSTGRES_PORT=5432
            - GOSHORTEN_POSTGRES_USER=goshorten
            - GOSHORTEN_POSTGRES_PASSWORD=goshorten_secret
            - GOSHORTEN_POSTGRES_DB=goshorten
            - GOSHORTEN_GRPC_HOST=:9000
            - GOSHORTEN_GATEWAY_ADDR=:8080
            - GOSHORTEN_ADMIN_PASSWORD=admin
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5

    redis:
        image: "redis:alpine"
        command: >
            redis-server --requirepass mysecretpassword
            --tcp-backlog 1024
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "mysecretpassword", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    postgres:
        image: "postgres:16-alpine"
        hostname: postgres
        environment:
            POSTGRES_USER: goshorten
            POSTGRES_PASSWORD: goshorten_secret
            POSTGRES_DB: goshorten
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U goshorten"]
            interval: 5s
            timeout: 3s
            retries: 5

    frontend:
        hostname: frontend
        build:
            context: frontend/.
            dockerfile: Containerfile
        dns_search: .
        ports:
            - 8081:8081
        environment:
            - GOSHORTEN_BACKEND_URL=http://grpcbackend:8080
            - GOSHORTEN_GRPC_ADDR=grpcbackend:9000
        depends_on:
            grpcbackend:
                condition: service_healthy

volumes:
    pgdata:
