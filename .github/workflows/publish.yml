name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    env:
      APP_VERSION: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ────────────────────────────────────────────────────────────

      - name: Build and push backend (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:${{ env.APP_VERSION }}-amd64
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:latest-amd64
          build-args: APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-backend:cache-amd64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-backend:cache-amd64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build and push backend (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Containerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:${{ env.APP_VERSION }}-arm64
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:latest-arm64
          build-args: APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-backend:cache-arm64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-backend:cache-arm64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Create backend multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/goshorten-backend:${{ env.APP_VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/goshorten-backend:latest \
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:${{ env.APP_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/goshorten-backend:${{ env.APP_VERSION }}-arm64

      # ── Frontend ───────────────────────────────────────────────────────────

      - name: Build and push frontend (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:${{ env.APP_VERSION }}-amd64
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:latest-amd64
          build-args: APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-frontend:cache-amd64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-frontend:cache-amd64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Build and push frontend (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Containerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:${{ env.APP_VERSION }}-arm64
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:latest-arm64
          build-args: APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-frontend:cache-arm64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/goshorten-frontend:cache-arm64,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Create frontend multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/goshorten-frontend:${{ env.APP_VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/goshorten-frontend:latest \
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:${{ env.APP_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/goshorten-frontend:${{ env.APP_VERSION }}-arm64

