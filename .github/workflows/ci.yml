name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

# Shared condition: run the expensive steps only on PRs or master pushes.
# Branch pushes (feature/fix/etc.) get lint only for fast feedback.
env:
  FULL_RUN: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/master' }}

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: backend

      - name: Build
        if: env.FULL_RUN == 'true'
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null .

      - name: Test
        if: env.FULL_RUN == 'true'
        run: go test ./...

      - name: Docker build (smoke)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Containerfile
          push: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: frontend/go.mod
          cache-dependency-path: frontend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: frontend

      - name: Build
        if: env.FULL_RUN == 'true'
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/...

      - name: Test
        if: env.FULL_RUN == 'true'
        run: go test ./...

      - name: Docker build (smoke)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Containerfile
          push: false

  ui:
    name: React UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/ui-src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        if: env.FULL_RUN == 'true'
        run: npm run build
