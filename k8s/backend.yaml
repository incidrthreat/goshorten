apiVersion: apps/v1
kind: Deployment
metadata:
  name: goshorten-backend
  namespace: goshorten
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goshorten-backend
  template:
    metadata:
      labels:
        app: goshorten-backend
    spec:
      containers:
        - name: goshorten-backend
          image: ghcr.io/incidrthreat/goshorten-backend:latest
          env:
            - name: GOSHORTEN_REDIS_HOST
              value: "redis:6379"
            - name: GOSHORTEN_REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: REDIS_PASSWORD
            - name: GOSHORTEN_POSTGRES_HOST
              value: "postgres"
            - name: GOSHORTEN_POSTGRES_PORT
              value: "5432"
            - name: GOSHORTEN_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: POSTGRES_USER
            - name: GOSHORTEN_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: POSTGRES_PASSWORD
            - name: GOSHORTEN_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: POSTGRES_DB
            - name: GOSHORTEN_GRPC_HOST
              value: ":9000"
            - name: GOSHORTEN_GATEWAY_ADDR
              value: ":8080"
            - name: GOSHORTEN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: JWT_SECRET
            - name: GOSHORTEN_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: ADMIN_EMAIL
            - name: GOSHORTEN_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: goshorten-secrets
                  key: ADMIN_PASSWORD
          ports:
            - name: grpc
              containerPort: 9000
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: goshorten-backend
  namespace: goshorten
spec:
  selector:
    app: goshorten-backend
  ports:
    - name: grpc
      port: 9000
      targetPort: 9000
    - name: http
      port: 8080
      targetPort: 8080
