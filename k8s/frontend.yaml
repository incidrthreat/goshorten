apiVersion: apps/v1
kind: Deployment
metadata:
  name: goshorten-frontend
  namespace: goshorten
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goshorten-frontend
  template:
    metadata:
      labels:
        app: goshorten-frontend
    spec:
      containers:
        - name: goshorten-frontend
          image: ghcr.io/incidrthreat/goshorten-frontend:latest
          env:
            - name: GOSHORTEN_GRPC_ADDR
              value: "goshorten-backend:9000"
            - name: GOSHORTEN_BACKEND_URL
              value: "http://goshorten-backend:8080"
          ports:
            - containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: goshorten-frontend
  namespace: goshorten
spec:
  selector:
    app: goshorten-frontend
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goshorten-ingress
  namespace: goshorten
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: goshorten.example.com  # TODO: replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: goshorten-frontend
                port:
                  number: 8081
